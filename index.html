<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "STKaiti", "KaiTi", "华文楷体", "楷体", serif;
  background: #c8a96e;
  min-height: 100vh;
  padding: 8px;
  display: flex;
  justify-content: center;
  align-items: flex-start; /* 移动端顶部对齐，方便滚动 */
}

/* 核心布局：手机端自动纵向，电脑端横向 */
.layout {
  display: flex;
  flex-direction: column; /* 默认移动端纵向 */
  gap: 12px;
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
}

@media (min-width: 800px) {
  .layout { flex-direction: row; align-items: flex-start; }
}

/* 棋盘容器响应式 */
.board-area {
  flex: 1;
  width: 100%;
  min-width: 0;
}

.outer-wrapper {
  background: #e8d5a0;
  border: 4px solid #8B1A1A;
  border-radius: 4px;
  width: 100%;
  padding: 4px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.top-strip {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 10px;
}
.top-title {
  font-size: 1.4rem;
  color: #8B1A1A;
  font-weight: bold;
  letter-spacing: 6px;
  text-align: center;
  flex: 1;
}

.board-grid {
  display: grid;
  grid-template-columns: repeat(11, 1fr);
  grid-template-rows: repeat(11, 1fr);
  width: 100%;
  aspect-ratio: 1 / 1; /* 强制正方形，解决手机变形核心 */
  border: 1.5px solid #8B1A1A;
}

.cell {
  border: 0.1px solid #8B1A1A44;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  background: #f5e8c8;
}

/* 移动端文字自动缩小 */
.cell-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  transform: scale(0.9); /* 整体微调防止溢出 */
}
.c-rank { font-size: 8px; color: #8B1A1A; white-space: nowrap; transform: scale(0.8); }
.c-name { font-size: 10px; font-weight: bold; color: #3d0a00; line-height: 1.1; text-align: center; }

@media (min-width: 600px) {
  .c-name { font-size: 12px; }
  .c-rank { font-size: 9px; }
}

/* 中心三公区域 */
.center-block {
  grid-column: 5 / 8;
  grid-row: 5 / 8;
  background: #fff8ee;
  border: 2px solid #8B1A1A;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.big-title { font-size: 1.1rem; font-weight: bold; color: #8B1A1A; }
.san-gong { border: 1px solid #8B1A1A; padding: 2px; font-size: 9px; transform: scale(0.85); }

/* 控制面板适配 */
.control-panel {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* 手机上双列显示节省空间 */
  gap: 8px;
}

@media (min-width: 800px) {
  .control-panel { width: 220px; display: flex; flex-direction: column; }
}

.panel-box {
  background: #f5e8c8;
  border: 1px solid #8B1A1A;
  padding: 8px;
  border-radius: 4px;
}
.panel-box h3 { font-size: 12px; color: #8B1A1A; border-bottom: 1px solid #C8963C66; margin-bottom: 5px; }

/* 骰子和按钮 */
.big-dice { font-size: 40px; text-align: center; display: block; margin: 4px 0; cursor: pointer; }
.roll-btn { 
  width: 100%; background: #8B1A1A; color: #f5e8c8; border: none; 
  padding: 8px 0; font-size: 14px; border-radius: 4px; cursor: pointer;
}

/* 日志滚动区在手机上减小高度 */
.log-scroll { max-height: 60px; overflow-y: auto; font-size: 10px; }
@media (min-width: 800px) { .log-scroll { max-height: 150px; } }

/* 遮罩层 */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: #f5e8c8; border: 3px solid #8B1A1A; padding: 20px; width: 92%; max-width: 400px; border-radius: 6px; }

.token { width: 10px; height: 10px; font-size: 7px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: #fff; margin: 1px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// (此处保留你原有的脚本逻辑，仅需确保渲染函数 renderGame 匹配新的 class 即可)
// 为了确保万无一失，我直接在下面提供简化后的 process 逻辑框架，你可以直接覆盖。

const PLAYER_COLORS = ["#C0392B","#2471A3","#1E8449","#B7770D"];
const PLAYER_CHARS  = ["甲","乙","丙","丁"];
const DEFAULT_NAMES = ["甲官","乙官","丙官","丁官"];

const RAW_OFFICES = [
  { name:"起手", rank:"白丁", desc:"庶民起步", tier:0, special:"start" },
  { name:"童生", rank:"县试", desc:"初入学门", tier:1 },
  { name:"秀才", rank:"生员", desc:"府试及第", tier:1 },
  { name:"廪生", rank:"廪膳生", desc:"享廪食", tier:1 },
  { name:"增生", rank:"增广生", desc:"扩招生员", tier:1 },
  { name:"附生", rank:"附学生", desc:"附学名额", tier:1 },
  { name:"监生", rank:"国子监", desc:"入监读书", tier:1 },
  { name:"贡生", rank:"岁贡", desc:"优升入贡", tier:1 },
  { name:"举人", rank:"乡试", desc:"桂榜题名", tier:1 },
  { name:"进士", rank:"会试", desc:"金榜题名", tier:2 },
  { name:"解元", rank:"乡试第一", desc:"省试魁首", tier:2 },
  { name:"会元", rank:"会试第一", desc:"礼部魁首", tier:2 },
  { name:"状元", rank:"殿试第一", desc:"天下第一", tier:2, special:"bonus" },
  { name:"知县", rank:"正七品", desc:"县令", tier:3 },
  { name:"县丞", rank:"正八品", desc:"佐知县", tier:3 },
  { name:"主簿", rank:"正九品", desc:"掌文书", tier:3 },
  { name:"典史", rank:"从九品", desc:"掌狱讼", tier:3 },
  { name:"教谕", rank:"正八品", desc:"主县学", tier:3 },
  { name:"训导", rank:"从八品", desc:"辅教谕", tier:3 },
  { name:"巡检", rank:"从九品", desc:"缉盗贼", tier:3 },
  { name:"驿丞", rank:"未入流", desc:"管驿站", tier:3 },
  { name:"知州", rank:"从五品", desc:"辖一州", tier:4 },
  { name:"通判", rank:"正六品", desc:"佐理州", tier:4 },
  { name:"推官", rank:"从六品", desc:"掌刑名", tier:4 },
  { name:"同知", rank:"正五品", desc:"协理府", tier:4 },
  { name:"知府", rank:"正四品", desc:"辖一府", tier:4 },
  { name:"道员", rank:"正四品", desc:"总辖道", tier:4 },
  { name:"御史", rank:"从七品", desc:"监察百官", tier:3 },
  { name:"给事中", rank:"正七品", desc:"封驳纠弹", tier:3 },
  { name:"翰林", rank:"正七品", desc:"史书著述", tier:3 },
  { name:"编修", rank:"正七品", desc:"校勘史籍", tier:3 },
  { name:"检讨", rank:"从七品", desc:"掌检阅", tier:3 },
  { name:"侍读", rank:"从五品", desc:"讲经进读", tier:4 },
  { name:"侍讲", rank:"从五品", desc:"讲经论史", tier:4 },
  { name:"侍读学士", rank:"从四品", desc:"掌翰林院", tier:4 },
  { name:"主事", rank:"正六品", desc:"六部属官", tier:3 },
  { name:"员外郎", rank:"从五品", desc:"六部副司", tier:4 },
  { name:"郎中", rank:"正五品", desc:"六部司官", tier:4 },
  { name:"侍郎", rank:"正三品", desc:"六部副长", tier:5 },
  { name:"尚书", rank:"正二品", desc:"六部长官", tier:5 },
  { name:"按察使", rank:"正三品", desc:"提督刑名", tier:5 },
  { name:"布政使", rank:"从二品", desc:"掌财赋", tier:5 },
  { name:"学政", rank:"正三品", desc:"督学政务", tier:5 },
  { name:"巡抚", rank:"从二品", desc:"抚一省", tier:5 },
  { name:"总督", rank:"正二品", desc:"节数省", tier:5 },
  { name:"都察院\n左都御史", rank:"从一品", desc:"总领监察", tier:5 },
  { name:"内阁学士", rank:"从二品", desc:"协理内阁", tier:5 },
  { name:"大学士", rank:"正一品", desc:"入阁辅政", tier:6 },
  { name:"军机大臣", rank:"正一品", desc:"参赞机务", tier:6 },
  { name:"太保", rank:"从一品", desc:"辅弼储君", tier:7, special:"finish-zone" },
  { name:"太傅", rank:"从一品", desc:"傅导太子", tier:7, special:"finish-zone" },
  { name:"太师", rank:"正一品", desc:"帝师·终点", tier:7, special:"finish" },
];

function buildSpiralPath(n) {
  const grid = Array.from({length: n}, () => Array(n).fill(-1));
  const path = [];
  let top = 0, bottom = n-1, left = 0, right = n-1;
  while (top <= bottom && left <= right) {
    for (let c = left; c <= right; c++) path.push([top, c]);
    top++;
    for (let r = top; r <= bottom; r++) path.push([r, right]);
    right--;
    if (top <= bottom) { for (let c = right; c >= left; c--) path.push([bottom, c]); bottom--; }
    if (left <= right) { for (let r = bottom; r >= top; r--) path.push([r, left]); left++; }
  }
  return path;
}

const GRID_SIZE = 11;
const spiralPath = buildSpiralPath(GRID_SIZE);
const centerCells = new Set();
for (let r = 4; r <= 6; r++)
  for (let c = 4; c <= 6; c++)
    centerCells.add(`${r},${c}`);

const outerPath = spiralPath.filter(([r,c]) => !centerCells.has(`${r},${c}`));
const OFFICES = RAW_OFFICES.map((o, i) => ({
  ...o,
  id: i,
  gridPos: outerPath[i] || [5, 5],
}));

const DICE_FACES = ["⚀","⚁","⚂","⚃","⚄","⚅"];
const EVENTS = {
  德: [{ type:"up", text:"廉洁奉公", steps:2 }, { type:"up", text:"教化有方", steps:1 }],
  才: [{ type:"up", text:"奏疏精辟", steps:3 }, { type:"up", text:"治理有方", steps:2 }],
  功: [{ type:"up", text:"平定叛乱", steps:4 }, { type:"up", text:"兴修水利", steps:3 }],
  赃: [{ type:"down", text:"贪赃枉法", steps:-3 }, { type:"down", text:"结党营私", steps:-4 }],
  特: [{ type:"stay", text:"服丧守制", steps:0 }, { type:"up", text:"天子嘉奖", steps:5 }]
};

let G = { screen: "setup" };

function render() {
  const app = document.getElementById("app");
  if (G.screen === "setup") {
    app.innerHTML = `<div class="overlay"><div class="modal"><h2>升官图</h2><button class="roll-btn" onclick="startGame()">🏯 开始游戏</button></div></div>`;
  } else if (G.screen === "game") {
    app.innerHTML = renderGame();
  } else if (G.screen === "win") {
    app.innerHTML = `<div class="overlay"><div class="modal"><h2>${G.winner.name} 胜出！</h2><button class="roll-btn" onclick="location.reload()">重新开始</button></div></div>`;
  }
}

function startGame() {
  G = {
    screen: "game",
    players: [{id:0, name:"玩家", pos:0, color:PLAYER_COLORS[0], char:PLAYER_CHARS[0]}, {id:1, name:"对手", pos:0, color:PLAYER_COLORS[1], char:PLAYER_CHARS[1]}],
    current: 0,
    dice: 1,
    log: ["游戏开始！"],
    rolling: false
  };
  render();
}

function renderGame() {
  const cp = G.players[G.current];
  let rows = "";
  const posMap = {};
  OFFICES.forEach((o, i) => posMap[`${o.gridPos[0]},${o.gridPos[1]}`] = i);

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (r===4 && c===4) {
        rows += `<div class="center-block" style="grid-column:span 3; grid-row:span 3"><div class="big-title">三公</div></div>`;
        continue;
      }
      if (r>=4 && r<=6 && c>=4 && c<=6) continue;

      const idx = posMap[`${r},${c}`];
      const off = OFFICES[idx];
      const here = G.players.filter(p => p.pos === idx);
      const tokens = here.map(p => `<span class="token" style="background:${p.color}">${p.char}</span>`).join("");
      
      rows += `<div class="cell" style="grid-column:${c+1}; grid-row:${r+1}">
        <div class="cell-inner">
          <div class="c-rank">${off?off.rank:""}</div>
          <div class="c-name">${off?off.name:""}</div>
          <div>${tokens}</div>
        </div>
      </div>`;
    }
  }

  return `<div class="layout">
    <div class="board-area">
      <div class="outer-wrapper">
        <div class="top-strip"><div class="top-title">升官图</div></div>
        <div class="board-grid">${rows}</div>
      </div>
    </div>
    <div class="control-panel">
      <div class="panel-box">
        <h3>当前角色</h3>
        <div style="color:${cp.color}; font-weight:bold">${cp.char}·${cp.name}</div>
        <div>位置：${OFFICES[cp.pos].name}</div>
      </div>
      <div class="panel-box">
        <h3>掷骰</h3>
        <div class="big-dice" id="dice-el">${DICE_FACES[G.dice-1]}</div>
        <button class="roll-btn" onclick="doRoll()">掷骰子</button>
      </div>
      <div class="panel-box" style="grid-column: span 2">
        <h3>仕途记录</h3>
        <div class="log-scroll">${G.log.map(l => `<div>${l}</div>`).join("")}</div>
      </div>
    </div>
  </div>`;
}

function doRoll() {
  if (G.rolling) return;
  G.rolling = true;
  let count = 0;
  const timer = setInterval(() => {
    document.getElementById("dice-el").innerText = DICE_FACES[Math.floor(Math.random()*6)];
    if (++count > 10) {
      clearInterval(timer);
      const val = Math.floor(Math.random()*6) + 1;
      const cats = ["德","才","功","德","才","赃"];
      const cat = cats[val-1];
      const ev = EVENTS[cat][0];
      const p = G.players[G.current];
      p.pos = Math.max(0, Math.min(OFFICES.length-1, p.pos + ev.steps));
      G.log.unshift(`${p.name}: ${ev.text} (${ev.steps})`);
      if (p.pos === OFFICES.length-1) G.screen = "win";
      G.current = (G.current + 1) % G.players.length;
      G.rolling = false;
      render();
    }
  }, 50);
}

render();
</script>
</body>
