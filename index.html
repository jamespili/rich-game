<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  background: #c8a96e;
}
body {
  font-family: "STKaiti", "KaiTi", "华文楷体", "楷体", serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 5px;
}

#app {
  width: 100%;
  height: 100%;
  display: flex;
}

.layout {
  display: flex;
  width: 100%;
  height: 100%;
  gap: 8px;
  align-items: center;
  justify-content: center;
  flex-direction: row; /* 默认横向 */
}

/* 棋盘区域响应式 */
.board-area {
  flex: 0 1 auto;
  height: 96vh;
  max-height: 700px;
  aspect-ratio: 1;
}

/* 控制面板响应式 */
.control-panel {
  flex: 0 0 190px;
  height: 96vh;
  max-height: 700px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
}

/* --- 移动端适配 (竖屏) --- */
@media (max-aspect-ratio: 1/1) {
  .layout {
    flex-direction: column; /* 改为上下排列 */
  }
  .board-area {
    width: 100%;
    height: auto;
    max-height: 60vh; /* 棋盘占上半部分 */
    aspect-ratio: 1;
  }
  .control-panel {
    flex: 1;
    width: 100%;
    height: auto;
    max-height: 35vh;
    padding-right: 0;
  }
  .top-title {
    font-size: 16px;
    letter-spacing: 4px;
  }
}

.outer-wrapper {
  background: #e8d5a0;
  border: 3px solid #8B1A1A;
  border-radius: 4px;
  width: 100%;
  height: 100%;
  padding: 4px;
  box-shadow: 0 0 8px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
}
.top-strip {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px 4px;
}
.top-title {
  font-size: 20px;
  color: #8B1A1A;
  font-weight: bold;
  letter-spacing: 8px;
  text-align: center;
  flex: 1;
}
.corner-text {
  font-size: 11px;
  color: #8B1A1A;
  writing-mode: vertical-rl;
}
.board-frame {
  border: 2px solid #8B1A1A;
  background: #f5e8c8;
  position: relative;
  border-radius: 2px;
  flex: 1;
  width: 100%;
}
.board-grid {
  display: grid;
  grid-template-columns: repeat(11, 1fr);
  grid-template-rows: repeat(11, 1fr);
  width: 100%;
  height: 100%;
}
.cell {
  border: 0.5px solid #8B1A1A44;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.cell-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transform: scale(0.9); /* 缩小一点防止溢出 */
}
.c-rank { font-size: 7px; color: #8B1A1A; line-height: 1; margin-bottom: 1px;}
.c-name { font-size: 9px; color: #3d0a00; font-weight: bold; line-height: 1; text-align: center; white-space: pre-line;}

.center-block {
  grid-column: 5 / 8;
  grid-row: 5 / 8;
  border: 2px solid #8B1A1A;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #fff8ee;
  z-index: 2;
  padding: 2px;
}
.center-block .big-title { font-size: 14px; font-weight: bold; color: #8B1A1A; }
.center-row { display: flex; gap: 2px; transform: scale(0.9); }

.san-gong {
  display: flex;
  flex-direction: column;
  align-items: center;
  border: 1px solid #8B1A1A;
  padding: 1px 2px;
  background: rgba(255,248,238,0.85);
}
.san-gong .sg-name { font-size: 9px; font-weight: bold; }
.san-gong .sg-rank { font-size: 7px; }

.token {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1px solid #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 6px;
  color: #fff;
}
.tokens-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 1px;
}

.panel-box {
  background: #f5e8c8;
  border: 1px solid #8B1A1A;
  padding: 6px;
  border-radius: 4px;
}
.panel-box h3 {
  font-size: 12px;
  color: #8B1A1A;
  margin-bottom: 4px;
  text-align: center;
}
.player-row {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 2px 4px;
  font-size: 10px;
}
.player-row.active { background: #fff3e0; border-radius: 3px; }
.player-dot { width: 14px; height: 14px; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-size:9px; }

.big-dice {
  font-size: 40px;
  display: block;
  text-align: center;
  margin: 2px 0;
}
.roll-btn {
  width: 100%;
  background: #8B1A1A;
  color: #f5e8c8;
  border: none;
  padding: 8px 0;
  font-size: 14px;
  border-radius: 4px;
  font-family: inherit;
}

.event-display {
  background: #fff8ee;
  padding: 4px;
  font-size: 10px;
  min-height: 40px;
}
.log-scroll {
  max-height: 60px;
  overflow-y: auto;
  font-size: 9px;
}

.overlay {
  position: fixed; inset: 0;
  background: #000000aa;
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  padding: 10px;
}
.modal {
  background: #f5e8c8;
  border: 3px solid #8B1A1A;
  padding: 15px;
  width: 100%;
  max-width: 320px;
  border-radius: 6px;
}
.modal h2 { font-size: 18px; text-align: center; margin-bottom: 10px; }
.modal-intro { font-size: 11px; margin-bottom: 10px; padding: 5px; background: #fffbee; }
.form-select, .pname-input { width: 100%; padding: 8px; margin-bottom: 8px; font-size: 14px; }
.start-btn { width: 100%; padding: 12px; background: #8B1A1A; color: white; border: none; border-radius: 4px; }
</style>
