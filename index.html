<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>升官图 - 宫廷晋升版</title>
    <style>
        :root {
            --bg-paper: #f4e8c1;
            --border-red: #8B1A1A;
            --text-dark: #3d0a00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "STKaiti", "KaiTi", serif;
            background: #c8a96e;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .outer-wrapper {
            background: var(--bg-paper);
            border: 8px double var(--border-red);
            max-width: 800px;
            width: 100%;
            padding: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        /* 棋盘：11x11 黄金比例 */
        .board-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: var(--border-red);
            padding: 2px;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            grid-template-rows: repeat(11, 1fr);
            gap: 1px;
            width: 100%;
            height: 100%;
        }

        .cell {
            background: var(--bg-paper);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            transition: background 0.3s;
            cursor: default;
            position: relative;
        }

        /* 视觉分区：越往内颜色越重 */
        .cell[data-tier="0"] { background: #fdfaf0; } /* 庶民/功名 */
        .cell[data-tier="1"] { background: #f9f2d0; } /* 基层官 */
        .cell[data-tier="2"] { background: #f5e6a0; } /* 中层官 */
        .cell[data-tier="3"] { background: #ecc580; } /* 封疆大吏 */
        .cell[data-tier="4"] { background: #e0a070; } /* 内阁首辅 */

        .c-rank { font-size: 8px; color: #888; }
        .c-name { font-weight: bold; color: var(--text-dark); line-height: 1.2; text-align: center; }

        /* 棋子：小人进化系统 */
        .piece {
            position: absolute;
            width: 8%;
            height: 8%;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        /* 动态服装底座 */
        .piece-avatar {
            font-size: 24px;
            line-height: 1;
            position: relative;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
        }

        .piece-rank-tag {
            font-size: 9px;
            padding: 1px 4px;
            background: white;
            border-radius: 10px;
            border: 1px solid currentColor;
            white-space: nowrap;
            margin-top: -5px;
        }

        /* 控制面板 */
        .controls {
            margin-top: 20px;
            padding: 15px;
            border-top: 2px solid var(--border-red);
            text-align: center;
        }

        .dice-box {
            font-size: 60px;
            margin: 10px 0;
            cursor: pointer;
            user-select: none;
        }

        button {
            padding: 12px 40px;
            background: var(--border-red);
            color: #f4e8c1;
            border: none;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 2px;
        }

        button:active { transform: scale(0.95); }
        button:disabled { background: #999; }

        .game-log {
            height: 80px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #ddd;
            margin-top: 15px;
            padding: 8px;
            font-size: 12px;
            text-align: left;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="outer-wrapper">
    <div class="board-container">
        <div id="board" class="board-grid"></div>
        <div id="pieces-layer"></div>
    </div>

    <div class="controls">
        <h2 id="current-player" style="color:var(--border-red)">轮到：玩家一</h2>
        <div class="dice-box" id="dice-display">🎲</div>
        <button id="roll-btn" onclick="handleRoll()">掷骰晋升</button>
        <div class="game-log" id="log-box">大清吏部提示：点击按钮开始仕途。</div>
    </div>
</div>

<script>
// 1. 构建真实的官职阶梯 (共 121 个)
const OFFICE_DATA = [
    {n:"白丁", r:"草民", t:0}, {n:"童生", r:"功名", t:0}, {n:"秀才", r:"生员", t:0}, {n:"举人", r:"孝廉", t:0},
    {n:"进士", r:"天子门生", t:0}, {n:"翰林院\n编修", r:"正七品", t:1}, {n:"知县", r:"正七品", t:1},
    {n:"州判", r:"从六品", t:1}, {n:"推官", r:"正六品", t:1}, {n:"知州", r:"从五品", t:1},
    {n:"同知", r:"正五品", t:2}, {n:"知府", r:"正四品", t:2}, {n:"道员", r:"正四品", t:2},
    {n:"按察使", r:"正三品", t:3}, {n:"布政使", r:"从二品", t:3}, {n:"巡抚", r:"从二品", t:3},
    {n:"总督", r:"正二品", t:3}, {n:"六部\n侍郎", r:"从一品", t:4}, {n:"六部\n尚书", r:"正一品", t:4},
    {n:"协办\n大学士", r:"从一品", t:4}, {n:"文华殿\n大学士", r:"正一品", t:4}, {n:"领班\n军机大臣", r:"正一品", t:4},
    {n:"太保", r:"正一品", t:4}, {n:"太傅", r:"正一品", t:4}, {n:"太师", r:"终点", t:4}
];

// 自动填充剩余的 121 个格子，不再使用重复的“散官”
const ALL_OFFICES = [];
for(let i=0; i<121; i++) {
    if(i < OFFICE_DATA.length) {
        ALL_OFFICES.push(OFFICE_DATA[i]);
    } else {
        const last = OFFICE_DATA[OFFICE_DATA.length - 1];
        ALL_OFFICES.push({n: last.n, r: last.r, t: last.t});
    }
}

const G = {
    players: [
        {id: 0, name: "玩家一", pos: 0, color: "#8B1A1A", avatar: "👦"},
        {id: 1, name: "玩家二", pos: 0, color: "#1A5276", avatar: "👦"}
    ],
    current: 0,
    isRolling: false,
    spiralPath: []
};

// 2. 生成真正的向心螺旋路径 (外圈 -> 内圈)
function initSpiralPath() {
    const matrix = Array(11).fill().map(() => Array(11).fill(null));
    let x = 0, y = 0, dx = 1, dy = 0;
    for (let i = 0; i < 121; i++) {
        G.spiralPath.push([x, y]);
        matrix[y][x] = i;
        if (x + dx < 0 || x + dx >= 11 || y + dy < 0 || y + dy >= 11 || matrix[y+dy][x+dx] !== null) {
            [dx, dy] = [-dy, dx]; // 顺时针旋转
        }
        x += dx; y += dy;
    }
}

// 3. 官服进化逻辑
function getOfficialAvatar(pos) {
    if (pos < 4) return "👦"; // 平民
    if (pos < 10) return "👨‍💼"; // 芝麻官（蓝顶）
    if (pos < 15) return "👲"; // 中级官（红顶）
    if (pos < 20) return "💂"; // 封疆大吏
    return "尊"; // 一品大员
}

function renderBoard() {
    const board = document.getElementById("board");
    for (let i = 0; i < 121; i++) {
        const off = ALL_OFFICES[i];
        const [x, y] = G.spiralPath[i];
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.tier = off.t;
        cell.style.gridColumnStart = x + 1;
        cell.style.gridRowStart = y + 1;
        cell.innerHTML = `<div class="c-rank">${off.r}</div><div class="c-name">${off.n}</div>`;
        board.appendChild(cell);
    }

    // 初始化玩家棋子
    const layer = document.getElementById("pieces-layer");
    G.players.forEach(p => {
        const div = document.createElement("div");
        div.id = `piece-${p.id}`;
        div.className = "piece";
        div.style.color = p.color;
        div.innerHTML = `<div class="piece-avatar">👦</div><div class="piece-rank-tag">${p.name}</div>`;
        layer.appendChild(div);
        movePieceTo(p.id, 0);
    });
}

function movePieceTo(pid, pos) {
    const p = G.players[pid];
    const [x, y] = G.spiralPath[pos];
    const el = document.getElementById(`piece-${pid}`);
    
    // 计算坐标偏移（防止两个棋子完全重叠）
    const offset = pid * 10; 
    el.style.left = `calc(${x * (100/11)}% + 5px)`;
    el.style.top = `calc(${y * (100/11)}% + ${offset}px)`;
    
    // 更新外形
    const avatar = getOfficialAvatar(pos);
    el.querySelector(".piece-avatar").textContent = avatar;
}

function handleRoll() {
    if (G.isRolling) return;
    G.isRolling = true;
    document.getElementById("roll-btn").disabled = true;

    let steps = 0;
    const diceEl = document.getElementById("dice-display");
    const faces = ["⚀","⚁","⚂","⚃","⚄","⚅"];
    
    let count = 0;
    const interval = setInterval(() => {
        steps = Math.floor(Math.random() * 6) + 1;
        diceEl.textContent = faces[steps - 1];
        if (count++ > 12) {
            clearInterval(interval);
            finalizeMove(steps);
        }
    }, 60);
}

function finalizeMove(steps) {
    const p = G.players[G.current];
    const oldPos = p.pos;
    
    // 升降逻辑：1-2降级，3保持，4-6升级
    let move = 0;
    let msg = "";
    if (steps <= 2) {
        move = -1;
        msg = "遭遇弹劾，降职一等！";
    } else if (steps === 3) {
        move = 0;
        msg = "政绩平平，原地察看。";
    } else {
        move = steps - 3;
        msg = "皇恩浩荡，擢升入阁！";
    }

    let newPos = Math.max(0, Math.min(OFFICE_DATA.length - 1, p.pos + move));
    p.pos = newPos;
    movePieceTo(p.id, newPos);

    const logBox = document.getElementById("log-box");
    logBox.innerHTML = `<div><b>${p.name}</b> 掷出 ${steps}：${msg} 目前：${ALL_OFFICES[newPos].n}</div>` + logBox.innerHTML;

    if (newPos >= OFFICE_DATA.length - 1) {
        alert(`恭喜！${p.name} 荣升太师，位极人臣！游戏结束。`);
        location.reload();
    }

    G.current = (G.current + 1) % G.players.length;
    document.getElementById("current-player").textContent = `轮到：${G.players[G.current].name}`;
    document.getElementById("current-player").style.color = G.players[G.current].color;
    
    G.isRolling = false;
    document.getElementById("roll-btn").disabled = false;
}

window.onload = () => {
    initSpiralPath();
    renderBoard();
};
</script>
</body>
</html>
